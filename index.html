<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAUNE ROUGE</title>
    <style>
        /* ANTI-DESIGN: RAW, NO MARGINS, NO LIMITS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            /* GOTHIC EYEBALL CURSOR */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><path d="M20 10C10 10 2 20 2 20s8 10 18 10 18-10 18-10-8-10-18-10zm0 16a6 6 0 1 1 0-12 6 6 0 0 1 0 12z" fill="black" stroke="white" stroke-width="1"/><circle cx="20" cy="20" r="3" fill="black"/><path d="M20 5v3M20 32v3M32 10l-2 2M10 30l-2 2M32 30l-2-2M10 10l2 2" stroke="black" stroke-width="2" stroke-linecap="round"/></svg>') 20 20, auto;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            overflow-x: hidden; /* Prevent horizontal scroll */
            transition: background-color 0.05s;
        }

        /* Container stretches to full width */
        .main-container {
            display: flex;
            flex-direction: column;
            width: 100vw; 
            align-items: center;
        }

        /* Each section takes 100% width, no gaps */
        .section {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* FORCING FULL WIDTH ART */
        img {
            width: 100%;    /* Fills the horizontal space */
            height: auto;   /* Maintains aspect ratio */
            display: block; /* Removes bottom spacing */
        }

        /* STROBE EFFECT (Yellow #f5bb00 / Red #bf3100) */
        .strobe-active {
            animation: strobe-animation 0.06s infinite;
        }

        @keyframes strobe-animation {
            0% { background-color: #f5bb00; }
            50% { background-color: #bf3100; }
            100% { background-color: #f5bb00; }
        }

        /* Specific padding for "Anti-design" look */
        .skull { padding-top: 20px; }
        .thistle { padding-bottom: 20px; }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- TOP: SKULL -->
        <div class="section skull">
            <img src="skull.svg" alt="Skull">
        </div>

        <!-- MIDDLE: TEXT -->
        <div class="section text-logo">
            <img src="text.svg" alt="Jaune Rouge">
        </div>

        <!-- BOTTOM: THISTLE -->
        <div class="section thistle">
            <img src="thistle.svg" alt="Thistle">
        </div>
    </div>

    <script>
        const body = document.body;
        let isStrobe = false;

        window.addEventListener('click', () => {
            isStrobe = !isStrobe;
            if (isStrobe) {
                body.classList.add('strobe-active');
            } else {
                body.classList.remove('strobe-active');
                body.style.backgroundColor = "white";
            }
        });
    </script>
</body>
</html>
