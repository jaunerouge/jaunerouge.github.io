<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAUNE ROUGE</title>
    <style>
        /* RESET & ANTI-DESIGN */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Curseur Œil personnalisé */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><path d="M16 8C10 8 4 16 4 16s6 8 12 8 12-8 12-8-6-8-12-8zm0 13a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" fill="black" stroke="white" stroke-width="1"/></svg>') 16 16, auto;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 0.05s;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 90vh;
            width: 100%;
            padding: 40px 0;
        }

        .svg-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* Tailles des éléments */
        .skull { height: 30%; }
        .text-logo { height: 20%; }
        .thistle { height: 30%; }

        img {
            max-height: 100%;
            max-width: 90%;
            object-fit: contain;
        }

        /* ANIMATION STROBOSCOPE */
        .strobe-active {
            animation: strobe-animation 0.06s infinite;
        }

        @keyframes strobe-animation {
            0% { background-color: #f5bb00; } /* Jaune */
            50% { background-color: #bf3100; } /* Rouge */
            100% { background-color: #f5bb00; }
        }

        /* Email en bas (Optionnel) */
        .footer-mail {
            position: fixed;
            bottom: 20px;
            font-family: 'Times New Roman', serif;
            font-size: 14px;
            color: black;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 1. SKULL (TOP) -->
        <div class="svg-wrap skull">
            <img src="https://raw.githubusercontent.com/jaunerouge/jaunerouge.github.io/main/skull.svg" alt="Skull">
        </div>

        <!-- 2. TEXTE JAUNE ROUGE (MIDDLE) -->
        <div class="svg-wrap text-logo">
            <img src="https://raw.githubusercontent.com/jaunerouge/jaunerouge.github.io/main/text.svg" alt="Jaune Rouge">
        </div>

        <!-- 3. THISTLE (BOTTOM) -->
        <div class="svg-wrap thistle">
            <img src="https://raw.githubusercontent.com/jaunerouge/jaunerouge.github.io/main/thistle.svg" alt="Thistle">
        </div>
    </div>

    <div class="footer-mail">jaunered@proton.me</div>

    <script>
        const body = document.body;
        let isStrobe = false;

        // Clic pour activer/désactiver
        window.addEventListener('click', () => {
            isStrobe = !isStrobe;
            if (isStrobe) {
                body.classList.add('strobe-active');
            } else {
                body.classList.remove('strobe-active');
                body.style.backgroundColor = "white";
            }
        });
    </script>
</body>
</html>
