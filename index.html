<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAUNE ROUGE</title>
    <style>
        /* RESET TOTAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* HIDE THE REAL MOUSE */
            cursor: none !important;
        }

        body, html {
            width: 100%;
            background-color: white;
            overflow-x: hidden;
            transition: background-color 0.05s;
        }

        /* --- THE NEW BIG CURSOR --- */
        #custom-cursor {
            position: fixed;
            width: 100px; /* <--- CHANGE THIS TO MAKE IT EVEN BIGGER */
            height: 100px;
            background-image: url('pointer.svg');
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none; /* Allows you to click through the image */
            z-index: 9999;
            transform: translate(-50%, -50%); /* Centers the image on the tip of the mouse */
        }

        /* CONTENEUR PRINCIPAL */
        .content {
            display: flex;
            flex-direction: column;
            width: 100vw;
        }

        .section {
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            line-height: 0;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            transform: scale(1.1); 
        }

        /* EFFET 1 : VIBRATION (SKULL) */
        .vibrate {
            animation: glitch 0.15s infinite;
        }
        @keyframes glitch {
            0% { transform: scale(1.1) translate(0); }
            20% { transform: scale(1.1) translate(-5px, 5px); }
            40% { transform: scale(1.1) translate(-5px, -5px); }
            60% { transform: scale(1.1) translate(5px, 5px); }
            80% { transform: scale(1.1) translate(5px, -5px); }
            100% { transform: scale(1.1) translate(0); }
        }

        /* EFFET 2 : MARQUEE */
        .marquee-container {
            width: 100vw;
            background: #000;
            color: #fff;
            overflow: hidden;
            white-space: nowrap;
            padding: 15px 0;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.2rem;
            border-top: 4px solid red;
            border-bottom: 4px solid red;
        }
        .marquee-text {
            display: inline-block;
            animation: scroll 10s linear infinite;
        }
        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* EFFET 3 : FLOAT (THISTLE) */
        .float {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0) scale(1.1); }
            50% { transform: translateY(-20px) scale(1.1); }
            100% { transform: translateY(0) scale(1.1); }
        }

        /* STROBE CLICK */
        .strobe-active {
            animation: strobe-bg 0.1s infinite;
        }
        @keyframes strobe-bg {
            0% { background-color: white; }
            50% { background-color: red; }
            100% { background-color: black; }
        }

        .mail-footer {
            text-align: center;
            padding: 80px;
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            font-weight: bold;
            background: black;
            color: white;
        }
    </style>
</head>
<body>

    <!-- THE LARGE CURSOR ELEMENT -->
    <div id="custom-cursor"></div>

    <div class="content">
        <div class="section vibrate">
            <img src="skull.svg" alt="Skull">
        </div>

        <div class="marquee-container">
            <div class="marquee-text">
                JAUNE ROUGE - JAUNE ROUGE - JAUNE ROUGE - JAUNE ROUGE - JAUNE ROUGE - JAUNE ROUGE - JAUNE ROUGE - JAUNE ROUGE - 
            </div>
        </div>

        <div class="section">
            <img src="text.svg" alt="Jaune Rouge">
        </div>

        <div class="section float">
            <img src="thistle.svg" alt="Thistle">
        </div>

        <div class="mail-footer">
            CONTACT: JAUNERED@PROTON.ME
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const body = document.body;
        let isStrobe = false;

        // TRACK MOUSE MOVEMENT
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // STROBE ON CLICK
        window.addEventListener('click', () => {
            isStrobe = !isStrobe;
            if (isStrobe) {
                body.classList.add('strobe-active');
            } else {
                body.classList.remove('strobe-active');
                body.style.backgroundColor = "white";
            }
        });
    </script>
</body>
</html>
