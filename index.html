<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAUNE ROUGE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* CURSEUR EYE */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><path d="M20 5 L22 12 L29 10 L25 17 L32 20 L25 23 L29 30 L22 28 L20 35 L18 28 L11 30 L15 23 L8 20 L15 17 L11 10 L18 12 Z" fill="black" stroke="white" stroke-width="1"/><circle cx="20" cy="20" r="6" fill="white"/><circle cx="20" cy="20" r="3" fill="black"/></svg>') 20 20, auto;
        }

        body, html {
            width: 100%;
            background-color: white;
            overflow-x: hidden;
            transition: background-color 0.05s;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* S'assure que la zone cliquable prend tout l'écran */
        }

        .main-container {
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section {
            width: 100vw;
            display: flex;
            justify-content: center;
            overflow: hidden;
            line-height: 0; /* Évite les espaces blancs sous les images */
        }

        img {
            width: 100%;
            max-width: 100vw;
            height: auto;
            display: block;
        }

        /* SKULL VIBRANT */
        .skull img {
            animation: vibrate 0.15s infinite;
        }

        @keyframes vibrate {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        /* STROBE AU CLIC */
        .strobe-active {
            animation: strobe-animation 0.06s infinite !important;
        }

        @keyframes strobe-animation {
            0% { background-color: #f5bb00; }
            50% { background-color: #bf3100; }
            100% { background-color: #f5bb00; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- SKULL VIBRANT (TOP) -->
        <div class="section skull">
            <img src="skull.svg" alt="Skull">
        </div>

        <!-- TEXT LOGO (MILIEU) -->
        <div class="section">
            <img src="text.svg" alt="Jaune Rouge">
        </div>

        <!-- THISTLE (BAS) -->
        <div class="section">
            <img src="thistle.svg" alt="Thistle">
        </div>
    </div>

    <script>
        const body = document.body;
        let isStrobe = false;
        
        // Active/Désactive le Strobe au clic n'importe où sur la page
        window.addEventListener('click', () => {
            isStrobe = !isStrobe;
            if (isStrobe) {
                body.classList.add('strobe-active');
            } else { 
                body.classList.remove('strobe-active'); 
                body.style.backgroundColor = "white"; 
            }
        });
    </script>
</body>
</html>
