<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAUNE ROUGE</title>
    <style>
        /* RESET & CURSOR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* USES YOUR POINTER.SVG FILE */
            /* Note: 16 16 sets the 'click point' to the center of the image */
            cursor: url('pointer.svg') 16 16, auto;
        }

        body, html {
            width: 100%;
            background-color: white;
            overflow-x: hidden;
            transition: background-color 0.05s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* OLD SCHOOL MARQUEE BAR */
        .marquee-top {
            width: 100%;
            background: #000;
            color: #fff;
            padding: 5px 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            overflow: hidden;
            white-space: nowrap;
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .marquee-content {
            display: inline-block;
            animation: marquee 10s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* THE ART SECTIONS */
        .main-container {
            width: 100vw;
            margin-top: 30px; /* Space for marquee */
        }

        .section {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 0;
            margin: -5% 0; /* Anti-design: overlapping sections */
        }

        /* FULL WIDTH FIX */
        .section img {
            width: 110%; /* Forces it slightly wider than the screen */
            height: auto;
            display: block;
            /* This 'Scale' zooms into your SVG to remove the small look */
            transform: scale(1.4); 
            filter: contrast(110%);
        }

        /* OLD SCHOOL VIBRATION (SKULL) */
        .skull img {
            animation: shake 0.3s infinite;
        }

        @keyframes shake {
            0% { transform: scale(1.4) translate(0px, 0px); }
            25% { transform: scale(1.4) translate(-2px, 2px); }
            50% { transform: scale(1.4) translate(2px, -2px); }
            75% { transform: scale(1.4) translate(-1px, -1px); }
            100% { transform: scale(1.4) translate(0px, 0px); }
        }

        /* FLOATING EFFECT (THISTLE) */
        .thistle img {
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: scale(1.4) translateY(0); }
            50% { transform: scale(1.4) translateY(-30px); }
        }

        /* STROBE CLICK EFFECT */
        .strobe-active {
            animation: strobe-animation 0.06s infinite !important;
        }

        @keyframes strobe-animation {
            0% { background-color: #f5bb00; }
            50% { background-color: #bf3100; }
            100% { background-color: #f5bb00; }
        }

        .footer {
            padding: 100px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="marquee-top">
        <div class="marquee-content">
            CLICK ANYWHERE TO ACTIVATE STROBE — JAUNE ROUGE — NO LIMITS — 2024 — JAUNE ROUGE — 
        </div>
    </div>

    <div class="main-container">
        <!-- VIBRATING SKULL -->
        <div class="section skull">
            <img src="skull.svg" alt="Skull">
        </div>

        <!-- CENTER TEXT -->
        <div class="section text-logo">
            <img src="text.svg" alt="Text">
        </div>

        <!-- FLOATING THISTLE -->
        <div class="section thistle">
            <img src="thistle.svg" alt="Thistle">
        </div>
    </div>

    <div class="footer">
        [ CONTACT: JAUNERED@PROTON.ME ]
    </div>

    <script>
        const body = document.body;
        let isStrobe = false;

        window.addEventListener('click', () => {
            isStrobe = !isStrobe;
            if (isStrobe) {
                body.classList.add('strobe-active');
            } else {
                body.classList.remove('strobe-active');
                body.style.backgroundColor = "white";
            }
        });
    </script>
</body>
</html>
