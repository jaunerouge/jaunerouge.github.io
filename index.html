<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAUNE ROUGE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* CURSEUR GUN - Le point de tir (clic) est réglé sur le bout du canon (28 8) */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><path d="M4 8 h24 v6 h-4 l-2 10 h-6 l1 -10 h-13 z" fill="black" stroke="white" stroke-width="1"/></svg>') 28 8, auto;
        }

        body, html {
            width: 100%;
            background-color: white;
            overflow-x: hidden;
            transition: background-color 0.05s;
            display: flex;
            flex-direction: column;
        }

        .main-container {
            width: 100vw;
        }

        .section {
            width: 100vw;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 1. VIBRATING SKULL (Aggressive) */
        .skull img {
            animation: vibrate 0.15s infinite;
        }

        @keyframes vibrate {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        /* 2. MARQUEE SCROLL (90s Style) */
        .marquee-container {
            width: 100%;
            overflow: hidden;
            background: black;
            color: white;
            padding: 15px 0;
            font-family: "Courier New", Courier, monospace;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 2px solid red;
        }

        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 8s linear infinite;
            font-size: 24px;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 3. FLOATING THISTLE (Drifting) */
        .thistle img {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        /* STROBE ANIMATION (Triggered by click) */
        .strobe-active {
            animation: strobe-animation 0.06s infinite !important;
        }

        @keyframes strobe-animation {
            0% { background-color: #f5bb00; } /* Jaune */
            50% { background-color: #bf3100; } /* Rouge */
            100% { background-color: #f5bb00; }
        }

        .footer {
            text-align: center;
            padding: 60px;
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            font-weight: bold;
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- MARQUEE AT THE TOP -->
    <div class="marquee-container">
        <div class="marquee-text">
            JAUNE ROUGE — NO LIMITS — 2024 — JAUNE ROUGE — NO LIMITS — 2024 — JAUNE ROUGE
        </div>
    </div>

    <div class="main-container">
        <!-- VIBRATING SKULL -->
        <div class="section skull">
            <img src="skull.svg" alt="Skull">
        </div>

        <!-- MIDDLE TEXT (Static) -->
        <div class="section text-logo">
            <img src="text.svg" alt="Jaune Rouge">
        </div>

        <!-- FLOATING THISTLE -->
        <div class="section thistle">
            <img src="thistle.svg" alt="Thistle">
        </div>
    </div>

    <div class="footer">
        CONTACT: JAUNERED@PROTON.ME
    </div>

    <script>
        const body = document.body;
        let isStrobe = false;
        
        // Active/Désactive le Strobe au clic
        window.addEventListener('click', () => {
            isStrobe = !isStrobe;
            if (isStrobe) {
                body.classList.add('strobe-active');
            } else { 
                body.classList.remove('strobe-active'); 
                body.style.backgroundColor = "white"; 
            }
        });
    </script>
</body>
</html>
