<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAUNE ROUGE</title>
    <style>
        /* FULL SCREEN RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* GOTHIC TATTOO EYEBALL CURSOR */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><path d="M20 5 L22 12 L29 10 L25 17 L32 20 L25 23 L29 30 L22 28 L20 35 L18 28 L11 30 L15 23 L8 20 L15 17 L11 10 L18 12 Z" fill="black" stroke="white" stroke-width="1"/><circle cx="20" cy="20" r="6" fill="white"/><circle cx="20" cy="20" r="3" fill="black"/></svg>') 20 20, auto;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: white;
            overflow-x: hidden;
            transition: background-color 0.05s;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            width: 100vw;
        }

        /* FORCE FULL WIDTH & REMOVE INTERNAL SVG PADDING */
        .section {
            width: 100vw;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        img {
            width: 100vw; /* Fills the whole screen width */
            height: auto;
            display: block;
            /* If your SVGs have white space around them, this 'zoom' helps: */
            transform: scale(1.2); 
            filter: multiply; /* Blends better */
        }

        /* STROBE ANIMATION */
        .strobe-active {
            animation: strobe-animation 0.06s infinite;
        }

        @keyframes strobe-animation {
            0% { background-color: #f5bb00; }
            50% { background-color: #bf3100; }
            100% { background-color: #f5bb00; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="section"><img src="skull.svg"></div>
        <div class="section"><img src="text.svg"></div>
        <div class="section"><img src="thistle.svg"></div>
    </div>

    <script>
        const body = document.body;
        let isStrobe = false;
        window.addEventListener('click', () => {
            isStrobe = !isStrobe;
            if (isStrobe) body.classList.add('strobe-active');
            else { body.classList.remove('strobe-active'); body.style.backgroundColor = "white"; }
        });
    </script>
</body>
</html>
